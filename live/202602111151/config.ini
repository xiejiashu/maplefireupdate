; MapleStory Client Edit Boilerplate Configuration

[Client]
; Enable multi-client support (0=disabled, 1=enabled)
EnableMultiClient=1

; Enable registry redirection: HKEY_LOCAL_MACHINE -> HKEY_CURRENT_USER (0=disabled, 1=enabled)
; Avoids issues when running without administrator privileges
EnableRegistryRedirect=1

; Enable img loader (0=disabled, 1=enabled)
EnableImgLoader=1

; Enable IWzResMan::GetObjectA logging hook (0=disabled, 1=enabled)
EnableResManGetObjectHook=0

; Enable IWzProperty::Getitem logging hook (0=disabled, 1=enabled)
EnableWzPropertyGetItemHook=0

; Enable line break fixes for tooltip/item descriptions (0=disabled, 1=enabled)
EnableLineBreakFix=1

; Enable text analyzer logging (0=disabled, 1=enabled)
EnableTextAnalyzerLog=0

; Enable custom resolution (0=disabled, 1=enabled)
EnableCustomResolution=1

; Enable packet IV update (0=disabled, 1=enabled)
DisablePacketIVUpdate=0

; Enable network encryption key patch (0=disabled, 1=enabled)
EnableNetworkEncryption=1

; Enable file encryption from PCOM (0=disabled, 1=enabled)
EnableFileEncryption=1

; Enable Shanda removal hooks (0=disabled, 1=enabled)
EnableShandaRemoval=0

; Enable login version check patch (0=disabled, 1=enabled)
EnableLoginVersionCheck=0

; Enable tooltip font size patch (0=disabled, 1=enabled)
EnableTooltipFontSize=1

; Enable WZ link property fix (_inlink/_outlink/source) (0=disabled, 1=enabled)
EnableLinkPropertyFix=1

; Error code language (0x86=Chinese Simplified etc.)
ErrorCodeLanguage=0x86

; Display item/skill/map IDs for debugging (0=disabled, 1=enabled)
EnableIdDisplay=1

; Display weapon attack speed in item tooltips (0=disabled, 1=enabled)
EnableWeaponSpeedDisplay=1

; Improved temporary stat display with skill cooldown countdown (0=disabled, 1=enabled)
EnableImprovedTemporaryStatDisplay=0

; Expanded quickslot (0=disabled, 1=enabled)
EnableExpandedQuickSlot=1

; Enable language support patches (0=disabled, 1=enabled)
EnableLanguageSupport=1

; Enable crash/error logs (0=disabled, 1=enabled)
EnableErrorLogs=1

; Enable ImGui packet viewer overlay (0=disabled, 1=enabled)
EnablePacketViewer=0

; Enable StringPool localization hook (0=disabled, 1=enabled)
EnableStringPoolLocalization=1

; Disable joystick detection (0=enabled, 1=disabled)
DisableJoystickDetection=1

; CMob::IsMobOurTeam always returns true (0=disabled, 1=enabled)
EnableMobOurTeamAlwaysTrue=0

; CMob::IsSamePhaseWithMe always returns false (0=disabled, 1=enabled)
EnableMobSamePhaseAlwaysFalse=0

; Enable damage skin packet hooks (0=disabled, 1=enabled)
EnableDamageSkinPacketHook=1

; Enable damage skin rendering hooks (0=disabled, 1=enabled)
EnableDamageSkinRender=1

; Enable mouse teleportation (0=disabled, 1=enabled)
EnableMouseTeleport=1

[Server]
; Enable server redirection to private server (0=disabled, 1=enabled)
EnableRedirect=1

; Private server address (only when EnableRedirect=1) 
Address=139.159.142.174
; Address=127.0.0.1